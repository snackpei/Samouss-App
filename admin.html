<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Samouss'App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff3df;
color:#4b250c;
padding:25px;
}

h1{
text-align:center;
color:#ff7300;
font-size:42px;
}

.admin-box{
max-width:1100px;
margin:30px auto;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 15px 35px rgba(120,60,0,.15);
}

.card{
border:1px solid #ffb06a;
border-radius:16px;
padding:18px;
margin-bottom:16px;
background:#fffaf5;
}

.card h2{
margin:0 0 10px;
color:#5a2b0c;
}

.info{
margin:6px 0;
}

.status{
font-weight:bold;
color:#ff7300;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.accept{
background:#2ecc71;
color:white;
}

.refuse{
background:#e74c3c;
color:white;
}

.refresh{
display:block;
margin:20px auto;
background:#ff7300;
color:white;
}

.message{
text-align:center;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<h1>Admin Samouss'App</h1>

<button class="refresh" onclick="loadBars()">Actualiser</button>

<div class="admin-box" id="barsList">
Chargement...
</div>

<div class="message" id="message"></div>

<script>
const supabaseUrl = "https://ofbtvqnfcnzqptnzkkkq.supabase.co";
const supabaseKey = "sb_publishable_Anto7ahmj6Q7soSmd8QGgg_-uzGOQFn";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadBars(){
const list = document.getElementById("barsList");
const message = document.getElementById("message");

message.textContent = "";
list.innerHTML = "Chargement...";

const result = await supabaseClient
.from("BARS")
.select("*")
.order("created_at", { ascending:false });

if(result.error){
list.innerHTML = "Erreur : " + result.error.message;
return;
}

if(result.data.length === 0){
list.innerHTML = "Aucun bar proposé pour le moment.";
return;
}

list.innerHTML = "";

result.data.forEach(function(bar){
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h2>${bar.NOM || "Sans nom"}</h2>
<div class="info"><strong>Ville :</strong> ${bar.VILLE || ""}</div>
<div class="info"><strong>Adresse :</strong> ${bar.ADRESSE || ""}</div>
<div class="info"><strong>Téléphone :</strong> ${bar.TELEPHONE || ""}</div>
<div class="info"><strong>Types :</strong> ${bar.TYPES || ""}</div>
<div class="info"><strong>Présentation :</strong> ${bar.PRESENTATION || ""}</div>
<div class="info"><strong>Slug :</strong> ${bar.SLUG || ""}</div>
<div class="info status"><strong>Statut :</strong> ${bar.STATUT || ""}</div>

<div class="actions">
<button class="accept" onclick="updateStatus(${bar.id}, 'valide')">Valider</button>
<button class="refuse" onclick="updateStatus(${bar.id}, 'refuse')">Refuser</button>
</div>
`;

list.appendChild(card);
});
}

async function updateStatus(id, statut){
const message = document.getElementById("message");
message.textContent = "Mise à jour...";

const result = await supabaseClient
.from("BARS")
.update({ STATUT: statut })
.eq("id", id);

if(result.error){
message.textContent = "Erreur : " + result.error.message;
return;
}

message.textContent = "Statut mis à jour ✅";
loadBars();
}

loadBars();
</script>

</body>
</html>
