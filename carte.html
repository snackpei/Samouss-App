<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte - Samouss'App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#fff8ef;
color:#2b1608;
}

.app{
max-width:520px;
margin:auto;
min-height:100vh;
background:#fffaf3;
padding-bottom:80px;
}

.header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:900;
color:#9b3f00;
}

.header a{
text-decoration:none;
color:#9b3f00;
font-size:28px;
}

h1{
font-size:28px;
padding:0 18px 14px;
color:#ff7300;
}

#map{
height:62vh;
margin:0 18px;
border-radius:26px;
border:2px solid #ffb06a;
overflow:hidden;
box-shadow:0 16px 35px rgba(130,70,0,.15);
}

.list{
padding:20px 18px;
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:white;
border:1px solid #ffe0bf;
border-radius:20px;
padding:16px;
box-shadow:0 8px 20px rgba(130,70,0,.10);
text-decoration:none;
color:#2b1608;
}

.card strong{
font-size:18px;
}

.meta{
font-size:13px;
color:#6d5a47;
margin-top:6px;
}

.empty{
background:white;
padding:18px;
border-radius:18px;
text-align:center;
color:#7b5a40;
}

.bottom-nav{
position:fixed;
left:50%;
bottom:0;
transform:translateX(-50%);
width:100%;
max-width:520px;
background:white;
border-radius:28px 28px 0 0;
box-shadow:0 -8px 25px rgba(0,0,0,.08);
display:grid;
grid-template-columns:repeat(4,1fr);
padding:12px 5px;
z-index:1000;
}

.nav-item{
text-align:center;
font-size:12px;
color:#6b5140;
font-weight:700;
text-decoration:none;
}

.nav-item span{
display:block;
font-size:24px;
margin-bottom:4px;
}

.active{color:#ff7300}
</style>
</head>

<body>

<div class="app">

<div class="header">
<a href="index.html">‹</a>
<div>Bonjourrrraaaaaaan</div>
<div>♡</div>
</div>

<h1>Carte des bars à samoussas</h1>

<div id="map"></div>

<div class="list" id="barsList">
<div class="empty">Chargement des bars...</div>
</div>

<div class="bottom-nav">
<a class="nav-item" href="index.html"><span>⌂</span>Accueil</a>
<a class="nav-item active" href="carte.html"><span>⌕</span>Carte</a>
<a class="nav-item" href="ajouter.html"><span>＋</span>Ajouter</a>
<a class="nav-item" href="classement.html"><span>★</span>Top</a>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const supabaseUrl = "https://ofbtvqnfcnzqptnzkkkq.supabase.co";
const supabaseKey = "sb_publishable_Anto7ahmj6Q7soSmd8QGgg_-uzGOQFn";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

const villes = {
"saint-denis":[-20.8789,55.4481],
"saint-pierre":[-21.3393,55.4781],
"saint-paul":[-21.0096,55.2707],
"saint-leu":[-21.1706,55.2882],
"le tampon":[-21.2787,55.5151],
"saint-andre":[-20.9633,55.6503],
"saint-benoit":[-21.0348,55.7128],
"saint-louis":[-21.2865,55.4110],
"saint-joseph":[-21.3777,55.6156],
"la possession":[-20.9296,55.3351],
"le port":[-20.9373,55.2919],
"etang-sale":[-21.2707,55.3620],
"l'etang-sale":[-21.2707,55.3620],
"les avirons":[-21.2411,55.3361],
"trois-bassins":[-21.1048,55.2994],
"cilaos":[-21.1351,55.4719],
"salazie":[-21.0272,55.5395],
"sainte-marie":[-20.8968,55.5497],
"sainte-suzanne":[-20.9056,55.6070],
"sainte-rose":[-21.1299,55.7952],
"bras-panon":[-20.9968,55.6784],
"plaine-des-palmistes":[-21.1346,55.6259],
"entre-deux":[-21.2333,55.4667],
"petite-ile":[-21.3537,55.5668]
};

function normalizeVille(ville){
return (ville || "")
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.trim();
}

const map = L.map("map").setView([-21.1151,55.5364],10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap"
}).addTo(map);

async function loadBars(){
const list = document.getElementById("barsList");

const result = await supabaseClient
.from("BARS")
.select("*")
.eq("STATUT","valide")
.order("created_at",{ascending:false});

if(result.error){
list.innerHTML = `<div class="empty">Erreur : ${result.error.message}</div>`;
return;
}

if(result.data.length === 0){
list.innerHTML = `<div class="empty">Aucun bar validé pour le moment.</div>`;
return;
}

list.innerHTML = "";

result.data.forEach(function(bar){
const villeKey = normalizeVille(bar.VILLE);
const coords = villes[villeKey] || [-21.1151,55.5364];

L.marker(coords)
.addTo(map)
.bindPopup(`
<strong>${bar.NOM || "Bar à samoussas"}</strong><br>
${bar.VILLE || ""}<br><br>

<a href="bar.html?slug=${bar.SLUG}" style="display:block;margin-bottom:8px;">
📄 Voir la fiche
</a>

<a target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((bar.ADRESSE || "") + " " + (bar.VILLE || "") + " La Réunion")}"
style="display:block;margin-bottom:8px;">
🗺️ Google Maps
</a>

<a target="_blank"
href="https://waze.com/ul?q=${encodeURIComponent((bar.ADRESSE || "") + " " + (bar.VILLE || "") + " La Réunion")}&navigate=yes"
style="display:block;">
🚗 Waze
</a>
`);

const card = document.createElement("a");
card.className = "card";
card.href = "bar.html?slug=" + bar.SLUG;

card.innerHTML = `
<strong>${bar.NOM || ""}</strong>
<div class="meta">${bar.VILLE || ""} · ${bar.ADRESSE || ""}</div>
<div class="meta">${bar.TYPES || ""}</div>
`;

list.appendChild(card);
});
}

loadBars();
</script>

</body>
</html>
