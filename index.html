<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#fffaf2,#ffe8c2);
color:#5c2d00;
min-height:100vh;
padding:25px;
}

.container{
max-width:720px;
margin:auto;
text-align:center;
}

.logo-samoussa{
width:95px;
height:82px;
margin:0 auto 12px;
filter:drop-shadow(0 10px 14px rgba(142,78,0,.22));
}

.logo-samoussa svg{
width:100%;
height:100%;
}

h1{
font-size:44px;
color:#ff7b00;
margin-bottom:10px;
font-weight:900;
}

.subtitle{
font-size:18px;
margin-bottom:30px;
color:#7a4a18;
}

.form-box{
background:white;
border-radius:26px;
padding:25px;
box-shadow:0 15px 35px rgba(255,138,0,.18);
text-align:left;
}

.form-box h2{
text-align:center;
margin-bottom:22px;
color:#5c2d00;
}

label{
display:block;
font-weight:bold;
margin:14px 0 6px;
}

input, textarea{
width:100%;
padding:14px;
border:1px solid #ffd39b;
border-radius:14px;
font-size:15px;
outline:none;
background:#fffdf9;
}

textarea{
min-height:110px;
resize:none;
}

.counter{
text-align:right;
font-size:13px;
color:#9a6a3a;
margin-top:6px;
}

.check-group{
margin-top:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.check-item{
background:#fff7eb;
border:1px solid #ffd39b;
padding:12px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.check-item input{
width:auto;
transform:scale(1.2);
}

.helper{
font-size:13px;
color:#9a6a3a;
margin-top:6px;
}

button{
width:100%;
margin-top:22px;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff7b00,#ffb347);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.success{
display:none;
margin-top:18px;
padding:14px;
background:#e9ffe8;
border:1px solid #8bd884;
border-radius:14px;
color:#256b1f;
text-align:center;
font-weight:bold;
}

@media(max-width:600px){
.check-group{grid-template-columns:1fr;}
h1{font-size:36px;}
}
</style>
</head>

<body>

<div class="container">

<div class="logo-samoussa">
<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ffd36a"/>
<stop offset="45%" stop-color="#f28a12"/>
<stop offset="100%" stop-color="#b84b00"/>
</linearGradient>
</defs>
<path d="M60 8 C72 29 91 57 108 87 C75 89 42 89 12 87 C29 57 48 29 60 8Z"
fill="url(#gold)" stroke="#8f3a00" stroke-width="3"/>
</svg>
</div>

<h1>Bonjourrrraaaaaaan</h1>
<p class="subtitle">Ajoute ton bar à samoussas sur <strong>Samouss'App</strong></p>

<div class="form-box">
<h2>Formulaire d’ajout</h2>

<form id="barForm">

<label>Nom du bar à samoussas</label>
<input type="text" id="nom" required>

<label>Ville</label>
<input type="text" id="ville" required>

<label>Adresse</label>
<input type="text" id="adresse" required>

<label>Téléphone / WhatsApp</label>
<input type="tel" id="telephone" required>

<label>Types de samoussas proposés</label>
<div class="check-group">
<label class="check-item"><input type="checkbox" value="Poulet" class="typeBox"> Poulet</label>
<label class="check-item"><input type="checkbox" value="Porc" class="typeBox"> Porc</label>
<label class="check-item"><input type="checkbox" value="Végé" class="typeBox"> Végé</label>
<label class="check-item"><input type="checkbox" value="Halal" class="typeBox"> Halal</label>
<label class="check-item"><input type="checkbox" value="Bœuf" class="typeBox"> Bœuf</label>
<label class="check-item"><input type="checkbox" value="Spéciaux" class="typeBox"> Spéciaux</label>
</div>

<label>Présentation du commerce</label>
<textarea id="presentation" maxlength="500" placeholder="500 caractères maximum"></textarea>
<div class="counter"><span id="count">0</span>/500</div>

<label>Photos du commerce et des produits</label>
<input type="file" id="photos" accept="image/*" multiple>
<div class="helper">Maximum 5 photos</div>

<button type="submit">Ajouter mon bar</button>

<div class="success" id="successMsg">
Ton bar a bien été ajouté en attente de validation ✅
</div>

</form>
</div>

</div>

<script>
const presentation = document.getElementById("presentation");
const count = document.getElementById("count");

presentation.addEventListener("input", function(){
count.textContent = this.value.length;
});

document.getElementById("barForm").addEventListener("submit", function(e){
e.preventDefault();

if(document.getElementById("photos").files.length > 5){
alert("Maximum 5 photos.");
return;
}

document.getElementById("successMsg").style.display = "block";
this.reset();
count.textContent = "0";
});
</script>

</body>
</html>
