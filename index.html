<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#fffaf2,#fff0dd);
color:#5a2f12;
min-height:100vh;
padding:30px;
}

.container{
max-width:1180px;
margin:auto;
text-align:center;
}

.mascotte{
width:150px;
height:130px;
margin:0 auto 5px;
position:relative;
filter:drop-shadow(0 10px 18px rgba(150,80,0,.25));
}

.samoussa{
width:0;
height:0;
border-left:75px solid transparent;
border-right:75px solid transparent;
border-bottom:125px solid #f5a12a;
position:absolute;
left:0;
top:0;
transform:rotate(0deg);
}

.samoussa::before{
content:"";
position:absolute;
left:-58px;
top:28px;
width:115px;
height:80px;
background:radial-gradient(circle,#ffd27b,#f28a12);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
opacity:.8;
}

.eye{
position:absolute;
top:62px;
width:24px;
height:30px;
background:white;
border-radius:50%;
border:3px solid #4b230c;
z-index:5;
}

.eye.left{left:48px;}
.eye.right{right:48px;}

.eye::after{
content:"";
position:absolute;
width:10px;
height:12px;
background:#2d1608;
border-radius:50%;
top:8px;
left:7px;
}

.mouth{
position:absolute;
top:92px;
left:63px;
width:25px;
height:16px;
background:#5b1900;
border-radius:0 0 20px 20px;
z-index:5;
}

.cheek{
position:absolute;
top:92px;
width:18px;
height:10px;
background:#ff7b61;
border-radius:50%;
opacity:.7;
z-index:5;
}

.cheek.left{left:35px;}
.cheek.right{right:35px;}

h1{
font-size:72px;
font-weight:900;
color:#ff7300;
line-height:1;
margin-top:5px;
}

.subtitle{
font-size:28px;
margin:18px 0 35px;
color:#6a3515;
}

.subtitle strong{
font-weight:900;
}

.form-box{
background:rgba(255,255,255,.9);
border-radius:22px;
padding:35px;
box-shadow:0 18px 45px rgba(120,60,0,.12);
text-align:left;
}

.form-box h2{
text-align:center;
font-size:34px;
margin-bottom:28px;
color:#5a2f12;
}

.form-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:22px;
}

label{
font-weight:bold;
display:block;
margin-bottom:8px;
}

input, textarea{
width:100%;
padding:15px;
border:1px solid #ffb36b;
border-radius:8px;
font-size:15px;
background:white;
outline:none;
}

textarea{
height:120px;
resize:none;
}

.types-section{
margin-top:26px;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.check-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.check-item{
border:1px solid #ffb36b;
border-radius:8px;
padding:15px;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
background:white;
}

.check-item input{
width:auto;
}

.counter{
text-align:right;
font-size:13px;
color:#7a5a40;
margin-top:-22px;
padding-right:12px;
}

.photo-zone{
margin-top:28px;
}

.upload-box{
border:1px dashed #ff9d45;
border-radius:10px;
padding:25px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
background:white;
}

.upload-text{
font-weight:bold;
}

.upload-text small{
display:block;
font-weight:normal;
margin-top:8px;
color:#7a5a40;
}

.photo-slots{
display:flex;
gap:16px;
}

.slot{
width:75px;
height:75px;
border:1px dashed #caa37e;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#a9825f;
}

button{
width:100%;
margin-top:24px;
padding:18px;
border:none;
border-radius:8px;
background:linear-gradient(180deg,#ff8a00,#ff5a00);
color:white;
font-size:24px;
font-weight:900;
cursor:pointer;
}

.success{
display:none;
margin-top:18px;
padding:15px;
border-radius:10px;
background:#e8ffe8;
color:#1f6b1f;
text-align:center;
font-weight:bold;
}

@media(max-width:900px){
h1{font-size:44px;}
.subtitle{font-size:20px;}
.form-grid,.types-section{grid-template-columns:1fr;}
.check-grid{grid-template-columns:1fr;}
.upload-box{flex-direction:column;align-items:flex-start;}
.photo-slots{flex-wrap:wrap;}
}
</style>
</head>

<body>

<div class="container">

<div class="mascotte">
<div class="samoussa"></div>
<div class="eye left"></div>
<div class="eye right"></div>
<div class="cheek left"></div>
<div class="cheek right"></div>
<div class="mouth"></div>
</div>

<h1>Bonjourrrraaaaaaan</h1>
<p class="subtitle">Ajoute ton bar à samoussas sur <strong>Samouss'App</strong></p>

<div class="form-box">
<h2>Formulaire d’ajout</h2>

<form id="barForm">

<div class="form-grid">
<div>
<label>Nom du bar à samoussas *</label>
<input type="text" id="nom" placeholder="Ex : Le Goût Péi" required>
</div>

<div>
<label>Ville *</label>
<input type="text" id="ville" placeholder="Ex : Saint-Denis" required>
</div>

<div>
<label>Adresse *</label>
<input type="text" id="adresse" placeholder="Ex : 12 rue des Samoussas" required>
</div>

<div>
<label>Téléphone / WhatsApp *</label>
<input type="tel" id="telephone" placeholder="Ex : 0692 00 00 00" required>
</div>
</div>

<div class="types-section">

<div>
<label>Types de samoussas proposés *</label>
<div class="check-grid">
<label class="check-item"><input type="checkbox" value="Poulet" class="typeBox"> Poulet</label>
<label class="check-item"><input type="checkbox" value="Porc" class="typeBox"> Porc</label>
<label class="check-item"><input type="checkbox" value="Végé" class="typeBox"> Végé</label>
<label class="check-item"><input type="checkbox" value="Halal" class="typeBox"> Halal</label>
<label class="check-item"><input type="checkbox" value="Bœuf" class="typeBox"> Bœuf</label>
<label class="check-item"><input type="checkbox" value="Spéciaux" class="typeBox"> Spéciaux</label>
</div>
</div>

<div>
<label>Présentation du commerce <span style="font-weight:normal;">(500 caractères max)</span> *</label>
<textarea id="presentation" maxlength="500" placeholder="Présente ton commerce : spécialités, ambiance, horaires, savoir-faire, produits maison..." required></textarea>
<div class="counter"><span id="count">0</span> / 500</div>
</div>

</div>

<div class="photo-zone">
<label>Photos du commerce et des produits *</label>

<div class="upload-box">
<div>
<div class="upload-text">Clique pour ajouter des photos ou glisse-dépose ici</div>
<small>Jusqu’à 5 photos maximum : devanture, vitrine, produits, ambiance...</small>
</div>

<div class="photo-slots">
<div class="slot">＋</div>
<div class="slot">＋</div>
<div class="slot">＋</div>
<div class="slot">＋</div>
<div class="slot">＋</div>
</div>
</div>

<input type="file" id="photos" accept="image/*" multiple style="margin-top:12px;">
</div>

<button type="submit">Ajouter mon bar</button>

<div class="success" id="successMsg">
Ton bar a bien été ajouté en attente de validation ✅
</div>

</form>
</div>

</div>

<script>
const presentation = document.getElementById("presentation");
const count = document.getElementById("count");

presentation.addEventListener("input", function(){
count.textContent = this.value.length;
});

document.getElementById("barForm").addEventListener("submit", function(e){
e.preventDefault();

const photoFiles = document.getElementById("photos").files;

if(photoFiles.length > 5){
alert("Maximum 5 photos.");
return;
}

let types = [];
document.querySelectorAll(".typeBox:checked").forEach(box=>{
types.push(box.value);
});

if(types.length === 0){
alert("Choisis au moins un type de samoussa.");
return;
}

const bar = {
nom: document.getElementById("nom").value,
ville: document.getElementById("ville").value,
adresse: document.getElementById("adresse").value,
telephone: document.getElementById("telephone").value,
types: types,
presentation: document.getElementById("presentation").value,
nombrePhotos: photoFiles.length
};

let bars = JSON.parse(localStorage.getItem("barsSamoussApp")) || [];
bars.push(bar);
localStorage.setItem("barsSamoussApp", JSON.stringify(bars));

document.getElementById("successMsg").style.display = "block";
this.reset();
count.textContent = "0";
});
</script>

</body>
</html>
