<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#fffaf2,#ffe8c2);
color:#5c2d00;
min-height:100vh;
padding:25px;
}

.container{
max-width:720px;
margin:auto;
text-align:center;
}

.logo-samoussa{
width:95px;
height:82px;
margin:0 auto 12px;
position:relative;
filter:drop-shadow(0 10px 14px rgba(142,78,0,.22));
}

.logo-samoussa svg{
width:100%;
height:100%;
}

h1{
font-size:44px;
color:#ff7b00;
margin-bottom:10px;
font-weight:900;
}

.subtitle{
font-size:18px;
margin-bottom:30px;
color:#7a4a18;
}

.form-box{
background:white;
border-radius:26px;
padding:25px;
box-shadow:0 15px 35px rgba(255,138,0,.18);
text-align:left;
}

.form-box h2{
text-align:center;
margin-bottom:22px;
color:#5c2d00;
}

label{
display:block;
font-weight:bold;
margin:14px 0 6px;
}

input, textarea{
width:100%;
padding:14px;
border:1px solid #ffd39b;
border-radius:14px;
font-size:15px;
outline:none;
background:#fffdf9;
}

textarea{
min-height:90px;
resize:none;
}

button{
width:100%;
margin-top:22px;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff7b00,#ffb347);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 22px rgba(255,123,0,.25);
}

button:hover{
transform:scale(1.02);
}

.success{
display:none;
margin-top:18px;
padding:14px;
background:#e9ffe8;
border:1px solid #8bd884;
border-radius:14px;
color:#256b1f;
text-align:center;
font-weight:bold;
}

.back{
display:block;
margin-top:22px;
text-align:center;
color:#ff7b00;
font-weight:bold;
text-decoration:none;
}

.brand{
font-size:15px;
margin-top:10px;
color:#9a6a3a;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-samoussa">
<svg viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ffd36a"/>
<stop offset="45%" stop-color="#f28a12"/>
<stop offset="100%" stop-color="#b84b00"/>
</linearGradient>
<radialGradient id="shine" cx="35%" cy="25%" r="60%">
<stop offset="0%" stop-color="#fff1b8" stop-opacity="0.9"/>
<stop offset="55%" stop-color="#ffb347" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#a74300" stop-opacity="0"/>
</radialGradient>
</defs>

<path d="M60 8 C72 29 91 57 108 87 C75 89 42 89 12 87 C29 57 48 29 60 8Z"
fill="url(#gold)" stroke="#8f3a00" stroke-width="3"/>

<path d="M60 8 C72 29 91 57 108 87 C75 89 42 89 12 87 C29 57 48 29 60 8Z"
fill="url(#shine)"/>

<path d="M28 78 C48 67 73 66 94 78" fill="none" stroke="#7a2f00" stroke-width="3" opacity=".45"/>

<circle cx="55" cy="43" r="3" fill="#9c3d00" opacity=".45"/>
<circle cx="69" cy="57" r="2.6" fill="#9c3d00" opacity=".38"/>
<circle cx="45" cy="63" r="2.2" fill="#9c3d00" opacity=".32"/>
</svg>
</div>

<h1>Bonjourrrraaaaaaan</h1>
<p class="subtitle">Ajoute ton bar à samoussas sur <strong>Samouss'App</strong></p>

<div class="form-box">
<h2>Formulaire d’ajout</h2>

<form id="barForm">

<label>Nom du bar à samoussas</label>
<input type="text" id="nom" placeholder="Ex : Le Goût Péi" required>

<label>Ville</label>
<input type="text" id="ville" placeholder="Ex : Saint-Denis" required>

<label>Adresse</label>
<input type="text" id="adresse" placeholder="Ex : 12 rue des Samoussas" required>

<label>Téléphone / WhatsApp</label>
<input type="tel" id="telephone" placeholder="Ex : 0692 00 00 00" required>

<label>Description</label>
<textarea id="description" placeholder="Ex : Samoussas chauds, faits maison, disponibles tous les jours."></textarea>

<button type="submit">Ajouter mon bar</button>

<div class="success" id="successMsg">
Ton bar a bien été ajouté en attente de validation ✅
</div>

</form>
</div>

<a href="#" class="back">Retour à l’accueil</a>
<div class="brand">Samouss'App — Le meilleur du samoussa arrive bientôt</div>

</div>

<script>
document.getElementById("barForm").addEventListener("submit", function(e){
e.preventDefault();

const bar = {
nom: document.getElementById("nom").value,
ville: document.getElementById("ville").value,
adresse: document.getElementById("adresse").value,
telephone: document.getElementById("telephone").value,
description: document.getElementById("description").value
};

let bars = JSON.parse(localStorage.getItem("barsSamoussApp")) || [];
bars.push(bar);
localStorage.setItem("barsSamoussApp", JSON.stringify(bars));

document.getElementById("successMsg").style.display = "block";
document.getElementById("barForm").reset();
});
</script>

</body>
</html>
