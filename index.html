<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#fffaf2,#ffe8c2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#5c2d00;
text-align:center;
overflow:hidden;
}

.box{
padding:35px;
max-width:600px;
animation:fadeIn 1.2s ease;
}

h1{
font-size:52px;
margin:0;
color:#ff8a00;
font-weight:900;
line-height:1.1;
text-shadow:0 4px 12px rgba(255,138,0,.15);
}

p{
font-size:20px;
margin-top:18px;
color:#7a4a18;
}

.small{
margin-top:14px;
font-size:15px;
color:#9a6a3a;
}

.wave{
display:inline-block;
animation:wave 1.8s infinite;
transform-origin:70% 70%;
}

.dot{
display:inline-block;
margin-top:28px;
width:14px;
height:14px;
border-radius:50%;
background:#ff8a00;
box-shadow:0 0 0 0 rgba(255,138,0,.5);
animation:pulse 1.8s infinite;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes pulse{
0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,138,0,.5);}
70%{transform:scale(1.2);box-shadow:0 0 0 18px rgba(255,138,0,0);}
100%{transform:scale(1);}
}

@keyframes wave{
0%{transform:rotate(0deg);}
15%{transform:rotate(14deg);}
30%{transform:rotate(-8deg);}
45%{transform:rotate(14deg);}
60%{transform:rotate(-4deg);}
75%{transform:rotate(10deg);}
100%{transform:rotate(0deg);}
}

@media(max-width:600px){
h1{
font-size:40px;
}
p{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="box">
<h1>Bonjourrrraaaaaaan 👋</h1>
<p>Bienvenue sur <strong>Samouss'App</strong></p>
<div class="small">Le meilleur du samoussa arrive bientôt...</div>
<div class="dot"></div>
</div>

</body>
</html>
