<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#fffaf4,#fff1df);
color:#5a2b0c;
min-height:100vh;
padding:30px;
}

.container{max-width:1250px;margin:auto;text-align:center}

.logo{width:170px;margin:auto;animation:floaty 3s ease-in-out infinite}
.logo svg{width:100%;display:block}

@keyframes floaty{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

h1{
font-size:82px;
color:#ff7300;
font-weight:900;
line-height:1;
}

.subtitle{
font-size:30px;
margin:18px 0 32px;
color:#6b3718;
}

.form-box{
background:rgba(255,255,255,.88);
border-radius:22px;
padding:34px;
box-shadow:0 20px 55px rgba(115,65,20,.13);
text-align:left;
}

.form-box h2{
text-align:center;
font-size:36px;
margin-bottom:28px;
}

.top-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

label{
display:block;
font-weight:800;
font-size:15px;
margin-bottom:9px;
}

.req{color:#ff6500}

input,textarea{
width:100%;
border:1.5px solid #ffb06a;
border-radius:8px;
padding:14px;
font-size:15px;
background:white;
outline:none;
}

textarea{
height:126px;
resize:none;
}

.middle-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px;
margin-top:26px;
}

.check-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.check-item{
border:1.5px solid #ffb06a;
border-radius:8px;
background:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
font-weight:800;
}

.check-item input{
width:17px;
height:17px;
accent-color:#ff7300;
}

.textarea-box{position:relative}

.counter{
position:absolute;
right:14px;
bottom:12px;
font-size:13px;
color:#7b644f;
}

.photo-zone{margin-top:26px}

.upload-box{
border:1.5px dashed #ffb06a;
border-radius:10px;
background:white;
padding:22px;
cursor:pointer;
}

.upload-title{
font-weight:900;
font-size:18px;
margin-bottom:8px;
}

.upload-small{
color:#6d5a47;
font-size:14px;
margin-bottom:18px;
}

.slots{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

.slot{
height:82px;
border:1.5px dashed #c9a581;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#a48363;
background:#fffaf5;
}

#photos{display:none}

button{
width:100%;
border:none;
border-radius:8px;
margin-top:16px;
padding:19px;
font-size:24px;
font-weight:900;
color:white;
background:linear-gradient(180deg,#ff8a00,#ff5a00);
cursor:pointer;
}

.success,.error{
display:none;
margin-top:16px;
padding:14px;
border-radius:10px;
text-align:center;
font-weight:800;
}

.success{
background:#e8ffe8;
color:#1f6b1f;
}

.error{
background:#ffe8e8;
color:#9b1c1c;
}

@media(max-width:950px){
h1{font-size:44px}
.subtitle{font-size:20px}
.top-grid,.middle-grid{grid-template-columns:1fr}
.check-grid{grid-template-columns:1fr}
.slots{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<svg viewBox="0 0 300 300">
<defs>
<linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ffd37c"/>
<stop offset="100%" stop-color="#f28a12"/>
</linearGradient>
</defs>
<path d="M150 30 L255 225 L45 225 Z" fill="url(#g1)" stroke="#d87000" stroke-width="6"/>
<circle cx="115" cy="145" r="28" fill="white"/>
<circle cx="185" cy="145" r="28" fill="white"/>
<circle cx="115" cy="145" r="15" fill="#2a1208"/>
<circle cx="185" cy="145" r="15" fill="#2a1208"/>
<circle cx="120" cy="138" r="5" fill="white"/>
<circle cx="190" cy="138" r="5" fill="white"/>
<circle cx="92" cy="175" r="12" fill="#ff9b8c"/>
<circle cx="208" cy="175" r="12" fill="#ff9b8c"/>
<path d="M125 195 Q150 225 175 195" stroke="#5b1900" stroke-width="8" fill="none" stroke-linecap="round"/>
<line x1="60" y1="175" x2="30" y2="150" stroke="#5b2a0d" stroke-width="10" stroke-linecap="round"/>
<line x1="240" y1="175" x2="270" y2="155" stroke="#5b2a0d" stroke-width="10" stroke-linecap="round"/>
<line x1="135" y1="225" x2="125" y2="265" stroke="#5b2a0d" stroke-width="10" stroke-linecap="round"/>
<line x1="165" y1="225" x2="175" y2="265" stroke="#5b2a0d" stroke-width="10" stroke-linecap="round"/>
<circle cx="125" cy="270" r="10" fill="#5b2a0d"/>
<circle cx="175" cy="270" r="10" fill="#5b2a0d"/>
</svg>
</div>

<h1>Bonjourrrraaaaaaan</h1>
<p class="subtitle">Ajoute ton bar à samoussas sur <strong>Samouss'App</strong></p>

<div class="form-box">

<h2>Formulaire d’ajout</h2>

<form id="barForm">

<div class="top-grid">
<div>
<label>Nom du bar <span class="req">*</span></label>
<input type="text" id="nom" required>
</div>

<div>
<label>Ville <span class="req">*</span></label>
<input type="text" id="ville" required>
</div>

<div>
<label>Adresse <span class="req">*</span></label>
<input type="text" id="adresse" required>
</div>

<div>
<label>Téléphone <span class="req">*</span></label>
<input type="text" id="telephone" required>
</div>
</div>

<div class="middle-grid">

<div>
<label>Types proposés <span class="req">*</span></label>

<div class="check-grid">
<label class="check-item"><input type="checkbox" value="Poulet" class="typeBox"> Poulet</label>
<label class="check-item"><input type="checkbox" value="Porc" class="typeBox"> Porc</label>
<label class="check-item"><input type="checkbox" value="Végé" class="typeBox"> Végé</label>
<label class="check-item"><input type="checkbox" value="Halal" class="typeBox"> Halal</label>
<label class="check-item"><input type="checkbox" value="Bœuf" class="typeBox"> Bœuf</label>
<label class="check-item"><input type="checkbox" value="Spéciaux" class="typeBox"> Spéciaux</label>
</div>
</div>

<div>
<label>Présentation du commerce <span class="req">*</span></label>
<div class="textarea-box">
<textarea maxlength="500" id="presentation" required></textarea>
<div class="counter"><span id="count">0</span>/500</div>
</div>
</div>

</div>

<div class="photo-zone">
<label>Photos du commerce <span class="req">*</span></label>

<label for="photos" class="upload-box">
<div class="upload-title">Clique ici pour ajouter 5 photos minimum</div>
<div class="upload-small">Devanture, vitrine, produits, ambiance...</div>

<div class="slots">
<div class="slot">+</div>
<div class="slot">+</div>
<div class="slot">+</div>
<div class="slot">+</div>
<div class="slot">+</div>
</div>
</label>

<input type="file" id="photos" multiple accept="image/*">
</div>

<button type="submit">Ajouter mon bar</button>

<div class="success" id="successMsg">
Ton commerce a bien été envoyé en attente de validation ✅
</div>

<div class="error" id="errorMsg">
Erreur lors de l’envoi. Vérifie Supabase.
</div>

</form>

</div>

</div>

<script>
const SUPABASE_URL = "https://ofbtvqnfcnzqptnzkkkq.supabase.co";
const SUPABASE_KEY = "sb_publishable_Anto7ahmj6Q7soSmd8QGgg_-uzGOQFn";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const presentation = document.getElementById("presentation");
const count = document.getElementById("count");

presentation.addEventListener("input", function(){
count.textContent = this.value.length;
});

function createSlug(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-z0-9]+/g,"-")
.replace(/^-+|-+$/g,"");
}

document.getElementById("barForm").addEventListener("submit", async function(e){
e.preventDefault();

document.getElementById("successMsg").style.display = "none";
document.getElementById("errorMsg").style.display = "none";

const photos = document.getElementById("photos").files;

if(photos.length < 5){
alert("Il faut ajouter minimum 5 photos.");
return;
}

let types = [];
document.querySelectorAll(".typeBox:checked").forEach(box=>{
types.push(box.value);
});

if(types.length === 0){
alert("Choisis au moins un type de samoussa.");
return;
}

const nom = document.getElementById("nom").value.trim();

const data = {
nom: nom,
ville: document.getElementById("ville").value.trim(),
adresse: document.getElementById("adresse").value.trim(),
telephone: document.getElementById("telephone").value.trim(),
presentation: document.getElementById("presentation").value.trim(),
types: types.join(", "),
photos: Array.from(photos).map(file => file.name).join(", "),
slug: createSlug(nom),
statut: "en_attente"
};

const { error } = await client
.from("BARS")
.insert([data]);

if(error){
console.error(error);
document.getElementById("errorMsg").style.display = "block";
return;
}

document.getElementById("successMsg").style.display = "block";
this.reset();
count.textContent = "0";
});
</script>

</body>
</html>
