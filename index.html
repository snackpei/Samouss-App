<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samouss'App</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#fffaf4,#fff1df);
color:#5a2b0c;
min-height:100vh;
padding:30px;
}

.container{
max-width:1250px;
margin:auto;
text-align:center;
}

.logo{
width:170px;
margin:auto;
}

.logo img{
width:100%;
display:block;
}

h1{
font-size:82px;
line-height:1;
color:#ff7300;
font-weight:900;
margin-top:-5px;
}

.subtitle{
font-size:30px;
margin:18px 0 32px;
color:#6b3718;
}

.subtitle strong{font-weight:900;}

.form-box{
background:rgba(255,255,255,.88);
border-radius:22px;
padding:34px 34px 28px;
box-shadow:0 20px 55px rgba(115,65,20,.13);
text-align:left;
}

.form-box h2{
text-align:center;
font-size:36px;
margin-bottom:28px;
color:#5a2b0c;
}

.top-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

label{
display:block;
font-weight:800;
font-size:15px;
margin-bottom:9px;
}

.req{color:#ff6500;}

.input-wrap{
position:relative;
}

.icon{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#9a5b25;
font-size:18px;
}

input,textarea{
width:100%;
border:1.5px solid #ffb06a;
border-radius:8px;
padding:14px 14px 14px 46px;
font-size:15px;
background:white;
outline:none;
color:#5a2b0c;
}

textarea{
height:126px;
resize:none;
padding:16px;
line-height:1.5;
}

.middle-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px;
margin-top:26px;
}

.check-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.check-item{
border:1.5px solid #ffb06a;
border-radius:8px;
background:white;
padding:15px 14px;
display:flex;
align-items:center;
gap:10px;
font-weight:800;
font-size:16px;
}

.check-item input{
width:17px;
height:17px;
padding:0;
accent-color:#ff7300;
}

.textarea-box{
position:relative;
}

.counter{
position:absolute;
right:14px;
bottom:12px;
font-size:13px;
color:#7b644f;
}

.photo-zone{
margin-top:26px;
}

.upload-box{
border:1.5px dashed #ffb06a;
border-radius:10px;
background:white;
padding:22px 26px;
display:grid;
grid-template-columns:1.3fr 1fr;
align-items:center;
gap:22px;
}

.upload-left{
display:flex;
align-items:center;
gap:20px;
}

.big-icon{
font-size:34px;
color:#ff7300;
}

.upload-title{
font-weight:900;
font-size:16px;
margin-bottom:8px;
}

.upload-small{
font-size:14px;
color:#6d5a47;
}

.slots{
display:flex;
justify-content:space-between;
gap:14px;
}

.slot{
width:76px;
height:76px;
border:1.5px dashed #c9a581;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#a48363;
}

#photos{
display:none;
}

button{
width:100%;
border:none;
border-radius:8px;
margin-top:16px;
padding:19px;
font-size:24px;
font-weight:900;
color:white;
background:linear-gradient(180deg,#ff8a00,#ff5a00);
cursor:pointer;
box-shadow:0 10px 20px rgba(255,100,0,.2);
}

.success{
display:none;
margin-top:16px;
padding:14px;
border-radius:10px;
background:#e8ffe8;
color:#1f6b1f;
text-align:center;
font-weight:800;
}

@media(max-width:950px){
h1{font-size:44px}
.subtitle{font-size:20px}
.top-grid,.middle-grid{grid-template-columns:1fr}
.check-grid{grid-template-columns:1fr}
.upload-box{grid-template-columns:1fr}
.slots{flex-wrap:wrap;justify-content:flex-start}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="Logo Samouss'App">
</div>

<h1>Bonjourrrraaaaaaan</h1>
<p class="subtitle">Ajoute ton bar à samoussas sur <strong>Samouss'App</strong></p>

<div class="form-box">

<h2>Formulaire d’ajout</h2>

<form id="barForm">

<div class="top-grid">

<div>
<label>Nom du bar à samoussas <span class="req">*</span></label>
<div class="input-wrap">
<span class="icon">▣</span>
<input type="text" id="nom" placeholder="Ex : Le Goût Péi" required>
</div>
</div>

<div>
<label>Ville <span class="req">*</span></label>
<div class="input-wrap">
<span class="icon">●</span>
<input type="text" id="ville" placeholder="Ex : Saint-Denis" required>
</div>
</div>

<div>
<label>Adresse <span class="req">*</span></label>
<div class="input-wrap">
<span class="icon">⌂</span>
<input type="text" id="adresse" placeholder="Ex : 12 rue des Samoussas" required>
</div>
</div>

<div>
<label>Téléphone / WhatsApp <span class="req">*</span></label>
<div class="input-wrap">
<span class="icon">☎</span>
<input type="tel" id="telephone" placeholder="Ex : 0692 00 00 00" required>
</div>
</div>

</div>

<div class="middle-grid">

<div>
<label>Types de samoussas proposés <span class="req">*</span></label>

<div class="check-grid">
<label class="check-item"><input type="checkbox" value="Poulet" class="typeBox"> 🐔 Poulet</label>
<label class="check-item"><input type="checkbox" value="Porc" class="typeBox"> 🐷 Porc</label>
<label class="check-item"><input type="checkbox" value="Végé" class="typeBox"> 🌿 Végé</label>
<label class="check-item"><input type="checkbox" value="Halal" class="typeBox"> ☪ Halal</label>
<label class="check-item"><input type="checkbox" value="Bœuf" class="typeBox"> 🐂 Bœuf</label>
<label class="check-item"><input type="checkbox" value="Spéciaux" class="typeBox"> ⭐ Spéciaux</label>
</div>
</div>

<div>
<label>Présentation du commerce <span style="font-weight:400;">(500 caractères max)</span> <span class="req">*</span></label>
<div class="textarea-box">
<textarea id="presentation" maxlength="500" placeholder="Présente ton commerce : spécialités, ambiance, horaires, savoir-faire, produits maison..." required></textarea>
<div class="counter"><span id="count">0</span> / 500</div>
</div>
</div>

</div>

<div class="photo-zone">
<label>Photos du commerce et des produits <span class="req">*</span></label>

<label for="photos" class="upload-box">
<div class="upload-left">
<div class="big-icon">▧</div>
<div>
<div class="upload-title">Clique pour ajouter des photos ou glisse-dépose ici</div>
<div class="upload-small">Jusqu’à 5 photos maximum (devanture, vitrine, produits, ambiance...)</div>
</div>
</div>

<div class="slots">
<div class="slot">▧</div>
<div class="slot">▧</div>
<div class="slot">▧</div>
<div class="slot">▧</div>
<div class="slot">▧</div>
</div>
</label>

<input type="file" id="photos" accept="image/*" multiple>
</div>

<button type="submit">Ajouter mon bar ✈</button>

<div class="success" id="successMsg">
Ton bar a bien été ajouté en attente de validation ✅
</div>

</form>
</div>

</div>

<script>
const presentation = document.getElementById("presentation");
const count = document.getElementById("count");

presentation.addEventListener("input", function(){
count.textContent = this.value.length;
});

document.getElementById("barForm").addEventListener("submit", function(e){
e.preventDefault();

const photoFiles = document.getElementById("photos").files;

if(photoFiles.length > 5){
alert("Maximum 5 photos.");
return;
}

let types = [];
document.querySelectorAll(".typeBox:checked").forEach(box=>{
types.push(box.value);
});

if(types.length === 0){
alert("Choisis au moins un type de samoussa.");
return;
}

document.getElementById("successMsg").style.display = "block";
this.reset();
count.textContent = "0";
});
</script>

</body>
</html>
